<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>votebox</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5" style="max-width: 560px;">

  <h1 class="mb-4">votebox</h1>

  <div class="card mb-4">
    <div class="card-body">
      <h2 class="h5 card-title">Новый опрос</h2>
      <div class="mb-3">
        <input id="q" class="form-control" placeholder="Вопрос">
      </div>
      <div class="mb-3">
        <input id="opts" class="form-control" placeholder="Варианты через запятую">
      </div>
      <button class="btn btn-primary" onclick="createPoll()">Создать</button>
    </div>
  </div>

  <div id="poll"></div>

</div>

<script>
let currentId = null;

async function createPoll() {
  const question = document.getElementById('q').value;
  const options = document.getElementById('opts').value.split(',').map(s => s.trim());

  const res = await fetch('/api/polls', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ question, options })
  });
  const poll = await res.json();
  currentId = poll.id;
  render(poll);
}

async function vote(optionId) {
  await fetch('/api/polls/' + currentId + '/vote', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ option_id: optionId })
  });
  setTimeout(refresh, 150);
}

async function refresh() {
  const res = await fetch('/api/polls/' + currentId);
  render(await res.json());
}

function render(poll) {
  const total = poll.options.reduce((sum, o) => sum + o.votes, 0) || 1;
  const rows = poll.options.map(o => {
    const pct = Math.round(o.votes / total * 100);
    return `
      <li class="list-group-item">
        <div class="d-flex justify-content-between align-items-center mb-2">
          <span>${o.text} — ${o.votes}</span>
          <button class="btn btn-sm btn-outline-primary" onclick="vote('${o.id}')">Голос</button>
        </div>
        <div class="progress" role="progressbar">
          <div class="progress-bar" style="width: ${pct}%">${pct}%</div>
        </div>
      </li>`;
  }).join('');

  document.getElementById('poll').innerHTML = `
    <div class="card">
      <div class="card-body">
        <h2 class="h5 card-title mb-3">${poll.question}</h2>
        <ul class="list-group list-group-flush">${rows}</ul>
      </div>
    </div>`;
}
</script>
</body>
</html>
